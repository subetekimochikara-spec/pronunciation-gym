.navline{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:8px 0 14px}.icon-back,.icon-home{width:54px;height:54px;border-radius:50%;border:1px solid rgba(125,211,252,.30);background:radial-gradient(circle at 35% 25%,rgba(255,255,255,.15),transparent 24%),rgba(8,18,34,.82);font-size:30px;box-shadow:0 0 18px rgba(34,211,238,.12);display:grid;place-items:center;padding:0}.icon-home{border-radius:18px;font-size:26px}
.panel{border:1px solid var(--line);border-radius:26px;background:radial-gradient(circle at 85% 4%,rgba(34,211,238,.12),transparent 24%),var(--panel);box-shadow:0 18px 60px rgba(0,0,0,.34);padding:15px}.panel-title{margin:0 0 15px;font-size:clamp(25px,6vw,42px);text-shadow:0 0 22px rgba(34,211,238,.35)}
.category-grid{display:grid;grid-template-columns:1fr;gap:12px}.category-card{min-height:118px;border-radius:24px;padding:16px;text-align:left;background:radial-gradient(circle at 85% 12%,rgba(34,211,238,.16),transparent 24%),linear-gradient(145deg,rgba(15,23,42,.84),rgba(8,47,73,.48));border:1px solid rgba(125,211,252,.26);box-shadow:0 0 22px rgba(34,211,238,.08);display:grid;grid-template-columns:minmax(180px,.72fr) 1.28fr;gap:14px;align-items:stretch}.cat-left{display:flex;flex-direction:column;justify-content:space-between;gap:8px}.cat-name{font-weight:1000;font-size:21px}.cat-tag{color:var(--muted);font-size:14px;margin-top:8px;line-height:1.35}.cat-num{display:inline-flex;margin-top:11px;padding:5px 9px;border-radius:999px;border:1px solid rgba(125,211,252,.23);background:rgba(2,6,23,.35);color:#bae6fd;font-size:12px;width:max-content}.cat-desc{border-left:1px solid rgba(125,211,252,.20);padding-left:14px;color:rgba(225,245,255,.86);font-size:14px;line-height:1.62}.cat-desc-title{font-size:11px;letter-spacing:.14em;color:var(--muted);font-weight:900;margin-bottom:6px;text-transform:uppercase}
.list{display:grid;gap:12px}
.training-menu{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:14px}
.word-row{display:flex;justify-content:space-between;align-items:center;gap:12px;border:1px solid rgba(125,211,252,.24);background:linear-gradient(145deg,rgba(15,23,42,.78),rgba(8,47,73,.42));border-radius:22px;padding:13px}
.training-card{position:relative;overflow:hidden;min-height:132px;border:1px solid rgba(125,211,252,.28);border-radius:28px;padding:16px;background:radial-gradient(circle at 86% 16%,rgba(34,211,238,.18),transparent 24%),linear-gradient(145deg,rgba(15,23,42,.88),rgba(8,47,73,.55));box-shadow:0 18px 46px rgba(0,0,0,.28),0 0 24px rgba(34,211,238,.10);text-align:left}
.training-card::before{content:"";position:absolute;inset:auto -20% -40% -20%;height:82px;background:radial-gradient(ellipse at 50% 40%,rgba(34,211,238,.18),transparent 68%);pointer-events:none}
.training-card:active{transform:scale(.97)}
.training-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
.training-icon{width:48px;height:48px;border-radius:18px;display:grid;place-items:center;font-size:25px;background:rgba(2,6,23,.44);border:1px solid rgba(125,211,252,.24);box-shadow:0 0 18px rgba(34,211,238,.12)}
.training-status{min-width:42px;height:42px;border-radius:50%;display:grid;place-items:center;border:1px solid rgba(250,204,21,.35);background:rgba(113,63,18,.20);font-size:20px}
.training-word{position:relative;z-index:1;font-size:clamp(25px,6vw,36px);font-weight:1000;line-height:1;margin-top:14px;text-shadow:0 0 22px rgba(34,211,238,.34);word-break:break-word}
.training-drill{position:relative;z-index:1;color:#bae6fd;font-size:13px;margin-top:8px;line-height:1.35}
.training-ipa{position:relative;z-index:1;color:var(--muted);font-size:14px;margin-top:5px}
.word-main{min-width:0}.word{font-size:21px;font-weight:1000;word-break:break-word}.ipa{color:var(--muted);font-size:14px;margin-top:3px}.chip{display:inline-flex;align-items:center;gap:5px;border:1px solid rgba(125,211,252,.24);border-radius:999px;background:rgba(2,6,23,.36);color:#bae6fd;padding:6px 10px;font-size:12px;white-space:nowrap}.empty{color:rgba(186,230,253,.72);line-height:1.65;text-align:center;padding:18px 8px}

.machine-launch{display:block}
.machine-card{position:relative;overflow:hidden;border:1px solid rgba(125,211,252,.30);border-radius:32px;padding:18px;background:radial-gradient(circle at 86% 12%,rgba(34,211,238,.20),transparent 26%),linear-gradient(145deg,rgba(15,23,42,.92),rgba(8,47,73,.56));box-shadow:0 24px 70px rgba(0,0,0,.34),0 0 28px rgba(34,211,238,.12)}
.machine-card::before{content:"";position:absolute;right:-18%;bottom:-28%;width:70%;height:55%;background:radial-gradient(ellipse at center,rgba(34,211,238,.18),transparent 70%);pointer-events:none}

.machine-icon{width:72px;height:72px;border-radius:24px;display:grid;place-items:center;font-size:36px;background:rgba(2,6,23,.48);border:1px solid rgba(125,211,252,.26);box-shadow:0 0 24px rgba(34,211,238,.14)}
.machine-meta{min-width:0}.machine-label{font-size:11px;letter-spacing:.16em;color:var(--muted);font-weight:800}.machine-name{font-size:clamp(32px,8vw,54px);font-weight:1000;line-height:1.02;margin-top:6px;text-shadow:0 0 26px rgba(34,211,238,.35)}.machine-tag{color:#bae6fd;margin-top:8px;font-size:15px;line-height:1.35}
.machine-preview{position:relative;z-index:1;display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}

.card-body{text-align:center}.big-word{font-size:clamp(54px,16vw,100px);line-height:1;font-weight:1000;text-shadow:0 0 30px rgba(34,211,238,.43);word-break:break-word}.big-ipa{margin-top:18px;color:#bae6fd;font-size:clamp(25px,7vw,42px)}.big-reading{margin-top:10px;color:rgba(255,247,204,.88);font-size:clamp(20px,5.5vw,32px);font-weight:850;text-shadow:0 0 18px rgba(250,204,21,.16)}.tap-note{margin-top:12px;color:rgba(186,230,253,.64);font-size:13px}.round-sound{width:122px;height:122px;border-radius:50%;border:1px solid rgba(34,211,238,.43);background:radial-gradient(circle at 36% 26%,rgba(255,255,255,.30),transparent 25%),linear-gradient(145deg,rgba(34,211,238,.31),rgba(14,165,233,.16),rgba(2,6,23,.82));box-shadow:0 0 36px rgba(34,211,238,.32);display:grid;place-items:center;font-size:46px;margin:0 auto 6px}

function categoryDesc(id,name){const d={
"front-vowels":"口の前側で作る母音。/iː/ と /ɪ/、/ɛ/ と /æ/ のように、日本語のイ・エ・アに寄せすぎない口の形と長さを鍛える。",
"central-vowels":"英語らしい脱力母音のゾーン。/ʌ/、/ə/、/ɚ/ を鍛えて、about・teacher・water が日本語っぽくならないようにする。",
"back-vowels":"口の奥で響かせる母音。/ɑː/、/ɔː/、/ʊ/、/uː/ の違いを作り、hot・thought・foot・food を分ける。",
"r-controlled":"Rが母音に入り込む音。bird・word・work・world のような、日本人が苦手な“こもるR母音”を鍛える。",
"diphthongs":"二重母音のトレーニング。day・go・time・now・boy のように、1音の中で口が動く感覚を作る。",
"th":"舌を軽く歯に当てて空気を出す音。think の /θ/ と this の /ð/ を、SやZやDに逃がさないための練習。",
"r":"日本語のラ行ではなく、舌を奥に引いて作るR。right・road・room で“巻く”より“奥に置く”感覚を鍛える。",
"l":"舌先を上の歯ぐきに当てるL。light・little・learn で、Rとの違いが一瞬で分かる口の形を作る。",
"v":"上の歯を下唇に軽く当てるV。very・vote・voice で、Bに逃げない摩擦音を鍛える。",
"w":"唇を丸く前に出して始めるW。water・word・work で、Rや日本語のウに埋もれない入口の形を作る。",
"ng":"舌の奥で止める鼻音。going・sing・morning で、最後にグを強く言わない英語のNGを鍛える。",
"sh":"唇を少し丸めて空気を通すSH。she・ship・shower で、日本語のシより奥行きのある音を作る。",
"ch":"TとSHが合体した破裂＋摩擦の音。chair・teacher・watch で、短く鋭いCHを鍛える。",
"j":"DとZHが合体した音。just・job・enjoy で、日本語のジャより英語らしい厚みを作る。",
"flap-t":"母音に挟まれたTが軽いDのように変わる音。water・better・city を“ワター”ではなく“ワダー”方向へ鍛える。",
"stop-t":"Tを強く破裂させず、喉や口の中で止める音。can't・mountain・button の自然な止まり方を練習する。",
"silent-letters":"書いてあるのに読まない文字。walk・talk・listen・know で、スペルに引っ張られない耳と口を作る。",
"t-y":"did you → didja のような連結変化。T/D + Y が自然にCH/Jっぽく変わる感覚を鍛える。",
"linking":"単語同士をつなげる練習。go on・pick it up・turn it on で、英語がブツ切れにならない流れを作る。",
"reduction":"gonna・wanna・gotta など、会話で弱く短くなる音。聞き取れる耳と、自然に言える口を作る。",
"contractions":"I'm・you're・don't などの短縮形。文字ではなく、会話の中で自然に縮む音として鍛える。",
"weak-forms":"to・for・of・and など、文の中で弱くなる小さな単語。英語のリズムを作る土台になる。",
"word-stress":"単語の中で強く読む場所を鍛える。computer・important のように、全部同じ強さで読まない練習。",
"sentence-stress":"文の中で大事な単語を強く読む練習。I want coffee. のように、意味の中心を音で立てる。",
"intonation":"上がる・下がる・驚く・確認するなど、気持ちを音の高さで出す練習。Really? や Wow! を自然にする。",
"thought-groups":"長い文を意味のまとまりで区切る練習。息継ぎと理解しやすさを作る。",
"connected-speech":"英語がつながって聞こえる現象をまとめて鍛える。What do you want? がワダヤワンに近づく感覚。",
"i-vs-ee":"ship / sheep の聞き分け。短い /ɪ/ と長く伸びる /iː/ を耳で分ける。",
"r-vs-l":"right / light の聞き分け。RとLを音として別物にする日本人最重要メニュー。",
"ae-vs-e":"bad / bed の聞き分け。/æ/ と /ɛ/ の口の開きと響きの違いを耳で掴む。",
"th-vs-s":"think / sink の聞き分け。THがSに聞こえる問題をつぶす耳トレ。",
"ah-vs-uh":"hot / hut の聞き分け。奥の /ɑː/ と中央の /ʌ/ を分ける。",
"oh-vs-aw":"go / saw の聞き分け。/oʊ/ と /ɔː/ の違いを耳で掴む。",
"v-vs-b":"very / berry の聞き分け。摩擦音Vと破裂音Bをはっきり分ける。",
"u-vs-uh":"food / foot の聞き分け。長い /uː/ と短い /ʊ/ を分ける。"
};return d[id]||`${name}の発音をまとめて鍛えるトレーニングメニュー。単語ではなく音を主役にして練習する。`}

function speakEar(side){const item=currentWords[currentIndex];speak(side==="left"?item.left:item.right)}
function speak(text){if(!("speechSynthesis" in window)){alert("この端末では音声読み上げに対応していません。");return}speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=1;u.pitch=1;const voices=speechSynthesis.getVoices();const v=voices.find(v=>v.lang==="en-US"&&/Samantha|Alex|Google US English|Microsoft Aria|Natural/i.test(v.name))||voices.find(v=>v.lang==="en-US")||voices.find(v=>v.lang&&v.lang.startsWith("en"));if(v)u.voice=v;speechSynthesis.speak(u)}
function resultRow(item){return `<div class="word-row" onclick="openFromWorkout('${item.islandId}','${item.categoryId}','${esc(favKey(item))}')"><div class="word-main"><div class="word">${item.word}</div><div class="ipa">${item.ipa} / ${item.categoryName}</div></div><span class="chip">${item.islandName}</span></div>`}
function openFromWorkout(islandId,categoryId,key){const zone=DATA.find(i=>i.id===islandId),category=zone.categories.find(c=>c.id===categoryId);currentIslandId=islandId;currentCategoryId=categoryId;currentWords=category.words.map(item=>({...item,islandId,islandName:zone.name,categoryId,categoryName:category.name}));currentIndex=currentWords.findIndex(x=>favKey(x)===key);if(currentIndex<0)currentIndex=0;isStudy=false;renderCard();showScreen(currentWords[currentIndex].type==="pair"?"earPracticeScreen":"practiceScreen")}
function esc(s){return String(s).replace(/'/g,"\'")}
speechSynthesis?.addEventListener?.("voiceschanged",()=>{});
</script>
