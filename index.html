function w(word,ipa,meaning,reading,category,companions){return{type:"word",word,ipa,meaning,reading,category,companions}}
function pair(left,right,leftIpa,rightIpa,meaning,reading,category){return{type:"pair",word:left+" / "+right,left,right,leftIpa,rightIpa,ipa:leftIpa+"   "+rightIpa,meaning,reading,category,companions:[left,right]}}
let favorites=[];
try{favorites=JSON.parse(localStorage.getItem("pg2GymFavoritesFixed")||"[]")}catch(e){favorites=[]}
let currentIslandId=null,currentCategoryId=null,currentWords=[],currentIndex=0,isStudy=false;
function flatWords(){return DATA.flatMap(zone=>zone.categories.flatMap(category=>category.words.map(item=>({...item,islandId:zone.id,islandName:zone.name,categoryId:category.id,categoryName:category.name}))))}
function saveFavorites(){try{localStorage.setItem("pg2GymFavoritesFixed",JSON.stringify(favorites))}catch(e){}}
function favKey(item){return item.type==="pair"?item.left+" / "+item.right:item.word}
function showScreen(id){const target=document.getElementById(id);if(!target){console.warn("Missing screen",id);return}document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));target.classList.add("active");window.scrollTo({top:0,behavior:"auto"});updateDiag(id)}
function goHome(){closePop();showScreen("home")}
function showInfo(title,body){document.getElementById("miniTitle").textContent=title;document.getElementById("miniBody").innerHTML=body;document.getElementById("miniPop").classList.add("open")}
function closePop(){const p=document.getElementById("miniPop");if(p)p.classList.remove("open")}
function progressHtml(){return DATA.map(z=>`<div class="word-row" onclick="showIsland('${z.id}')"><div class="word-main"><div class="word">${z.icon} ${z.name}</div><div class="ipa">${z.categories.length} menus</div></div><span class="chip">${z.categories.reduce((s,c)=>s+c.words.length,0)} sounds</span></div>`).join("")}
function toggleWorkouts(){const items=flatWords().filter(x=>favorites.includes(favKey(x)));showInfo("⭐ My Workouts",items.length?items.map(resultRow).join(""):'<div class="empty">☆を押した音がここに集まるで。<br>自分専用の発音メニューや⭐</div>')}
function showIsland(id){closePop();currentIslandId=id;const zone=DATA.find(i=>i.id===id);document.getElementById("categoryTitle").textContent=zone.icon+" "+zone.name;document.getElementById("categoryGrid").innerHTML=zone.categories.map(c=>`<button class="category-card" onclick="showWordList('${id}','${c.id}')"><div class="cat-left"><div><div class="cat-name">${c.name}</div><div class="cat-tag">${c.tag}</div></div><div class="cat-num">${c.words.length} sounds</div></div><div class="cat-desc"><div class="cat-desc-title">TRAINING FOCUS</div>${categoryDesc(c.id,c.name)}</div></button>`).join("");showScreen("categoryScreen")}

function categoryDesc(id,name){const d={
"front-vowels":"口の前側で作る母音。/iː/ と /ɪ/、/ɛ/ と /æ/ のように、日本語のイ・エ・アに寄せすぎない口の形と長さを鍛える。",
"central-vowels":"英語らしい脱力母音のゾーン。/ʌ/、/ə/、/ɚ/ を鍛えて、about・teacher・water が日本語っぽくならないようにする。",
"back-vowels":"口の奥で響かせる母音。/ɑː/、/ɔː/、/ʊ/、/uː/ の違いを作り、hot・thought・foot・food を分ける。",
"r-controlled":"Rが母音に入り込む音。bird・word・work・world のような、日本人が苦手な“こもるR母音”を鍛える。",
"diphthongs":"二重母音のトレーニング。day・go・time・now・boy のように、1音の中で口が動く感覚を作る。",
"th":"舌を軽く歯に当てて空気を出す音。think の /θ/ と this の /ð/ を、SやZやDに逃がさないための練習。",
"r":"日本語のラ行ではなく、舌を奥に引いて作るR。right・road・room で“巻く”より“奥に置く”感覚を鍛える。",
"l":"舌先を上の歯ぐきに当てるL。light・little・learn で、Rとの違いが一瞬で分かる口の形を作る。",
"v":"上の歯を下唇に軽く当てるV。very・vote・voice で、Bに逃げない摩擦音を鍛える。",
"w":"唇を丸く前に出して始めるW。water・word・work で、Rや日本語のウに埋もれない入口の形を作る。",
"ng":"舌の奥で止める鼻音。going・sing・morning で、最後にグを強く言わない英語のNGを鍛える。",
"sh":"唇を少し丸めて空気を通すSH。she・ship・shower で、日本語のシより奥行きのある音を作る。",
"ch":"TとSHが合体した破裂＋摩擦の音。chair・teacher・watch で、短く鋭いCHを鍛える。",
"j":"DとZHが合体した音。just・job・enjoy で、日本語のジャより英語らしい厚みを作る。",
"flap-t":"母音に挟まれたTが軽いDのように変わる音。water・better・city を“ワター”ではなく“ワダー”方向へ鍛える。",
"stop-t":"Tを強く破裂させず、喉や口の中で止める音。can't・mountain・button の自然な止まり方を練習する。",
"silent-letters":"書いてあるのに読まない文字。walk・talk・listen・know で、スペルに引っ張られない耳と口を作る。",
"t-y":"did you → didja のような連結変化。T/D + Y が自然にCH/Jっぽく変わる感覚を鍛える。",
"linking":"単語同士をつなげる練習。go on・pick it up・turn it on で、英語がブツ切れにならない流れを作る。",
"reduction":"gonna・wanna・gotta など、会話で弱く短くなる音。聞き取れる耳と、自然に言える口を作る。",
"contractions":"I'm・you're・don't などの短縮形。文字ではなく、会話の中で自然に縮む音として鍛える。",
"weak-forms":"to・for・of・and など、文の中で弱くなる小さな単語。英語のリズムを作る土台になる。",
"word-stress":"単語の中で強く読む場所を鍛える。computer・important のように、全部同じ強さで読まない練習。",
"sentence-stress":"文の中で大事な単語を強く読む練習。I want coffee. のように、意味の中心を音で立てる。",
"intonation":"上がる・下がる・驚く・確認するなど、気持ちを音の高さで出す練習。Really? や Wow! を自然にする。",
"thought-groups":"長い文を意味のまとまりで区切る練習。息継ぎと理解しやすさを作る。",
"connected-speech":"英語がつながって聞こえる現象をまとめて鍛える。What do you want? がワダヤワンに近づく感覚。",
"i-vs-ee":"ship / sheep の聞き分け。短い /ɪ/ と長く伸びる /iː/ を耳で分ける。",
"r-vs-l":"right / light の聞き分け。RとLを音として別物にする日本人最重要メニュー。",
"ae-vs-e":"bad / bed の聞き分け。/æ/ と /ɛ/ の口の開きと響きの違いを耳で掴む。",
"th-vs-s":"think / sink の聞き分け。THがSに聞こえる問題をつぶす耳トレ。",
"ah-vs-uh":"hot / hut の聞き分け。奥の /ɑː/ と中央の /ʌ/ を分ける。",
"oh-vs-aw":"go / saw の聞き分け。/oʊ/ と /ɔː/ の違いを耳で掴む。",
"v-vs-b":"very / berry の聞き分け。摩擦音Vと破裂音Bをはっきり分ける。",
"u-vs-uh":"food / foot の聞き分け。長い /uː/ と短い /ʊ/ を分ける。"
};return d[id]||`${name}の発音をまとめて鍛えるトレーニングメニュー。単語ではなく音を主役にして練習する。`}

function showWordList(islandId,categoryId){currentIslandId=islandId;currentCategoryId=categoryId;const zone=DATA.find(i=>i.id===islandId),category=zone.categories.find(c=>c.id===categoryId);currentWords=category.words.map(item=>({...item,islandId,islandName:zone.name,categoryId,categoryName:category.name}));document.getElementById("wordListTitle").textContent="🏋️ "+category.name+" Machine";document.getElementById("wordList").className="machine-launch";document.getElementById("wordList").innerHTML=machineLaunchHtml(category,currentWords);showScreen("wordListScreen")}
function machineLaunchHtml(category,items){const preview=items.slice(0,6).map(i=>`<span class="chip">${i.type==="pair"?i.left+" / "+i.right:i.word}</span>`).join("");return `<div class="machine-card"><div class="machine-top"><div class="machine-icon">🏋️</div><div class="machine-meta"><div class="machine-label">PRONUNCIATION MACHINE</div><div class="machine-name">${category.name}</div><div class="machine-tag">${category.tag}</div></div></div><div class="machine-preview">${preview}</div><button class="machine-start" onclick="startMachine()">START TRAINING 🎙️</button><div class="machine-note">単語を選ぶんじゃなく、この音をまとめて鍛える。</div></div>`}
function startMachine(){currentIndex=0;isStudy=false;renderCard();showScreen(currentWords[currentIndex].type==="pair"?"earPracticeScreen":"practiceScreen")}
function openCard(idx){currentIndex=idx;isStudy=false;renderCard();showScreen(currentWords[currentIndex].type==="pair"?"earPracticeScreen":"practiceScreen")}
function renderCard(){const item=currentWords[currentIndex];if(!item)return;const p=document.getElementById("machineProgress");if(p)p.textContent=(currentIndex+1)+" / "+currentWords.length;if(item.type==="pair"){renderEarCard(item);return}document.getElementById("cardWord").textContent=item.word;document.getElementById("cardIpa").textContent=item.ipa;document.getElementById("cardReading").textContent=item.reading;document.getElementById("studyWord").textContent=item.word;document.getElementById("studyMeaning").textContent=item.meaning;document.getElementById("studyReading").textContent=item.reading;document.getElementById("studyCategory").textContent=item.category;document.getElementById("studyCompanions").innerHTML=item.companions.map(c=>`<span class="chip">${c}</span>`).join("");document.getElementById("favBtn").textContent=favorites.includes(favKey(item))?"★":"☆";document.getElementById("favBtn").classList.toggle("on",favorites.includes(favKey(item)));document.getElementById("practiceSide").classList.toggle("hidden",isStudy);document.getElementById("studySide").classList.toggle("hidden",!isStudy)}
function renderEarCard(item){const p=document.getElementById("earMachineProgress");if(p)p.textContent=(currentIndex+1)+" / "+currentWords.length;document.getElementById("earPairTitle").textContent=item.left+"  /  "+item.right;document.getElementById("earPairIpa").textContent=item.leftIpa+"    "+item.rightIpa;document.getElementById("earPairReading").textContent=item.reading;document.getElementById("leftWord").textContent=item.left;document.getElementById("rightWord").textContent=item.right;document.getElementById("earFavBtn").textContent=favorites.includes(favKey(item))?"★":"☆";document.getElementById("earFavBtn").classList.toggle("on",favorites.includes(favKey(item)))}
function toggleStudy(){isStudy=!isStudy;renderCard()}
function toggleFavorite(){const item=currentWords[currentIndex],key=favKey(item);favorites=favorites.includes(key)?favorites.filter(x=>x!==key):[...favorites,key];saveFavorites();renderCard()}
function prevWord(){currentIndex=(currentIndex-1+currentWords.length)%currentWords.length;isStudy=false;renderCard()}
function nextWord(){currentIndex=(currentIndex+1)%currentWords.length;isStudy=false;renderCard()}
function speakCurrent(){speak(currentWords[currentIndex].word)}
function speakEar(side){const item=currentWords[currentIndex];speak(side==="left"?item.left:item.right)}
function speak(text){if(!("speechSynthesis" in window)){alert("この端末では音声読み上げに対応していません。");return}window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);u.lang="en-US";u.rate=1;u.pitch=1;const voices=window.speechSynthesis.getVoices();const v=voices.find(v=>v.lang==="en-US"&&/Samantha|Alex|Google US English|Microsoft Aria|Natural/i.test(v.name))||voices.find(v=>v.lang==="en-US")||voices.find(v=>v.lang&&v.lang.startsWith("en"));if(v)u.voice=v;window.speechSynthesis.speak(u)}
function resultRow(item){return `<div class="word-row" onclick="openFromWorkout('${item.islandId}','${item.categoryId}','${esc(favKey(item))}')"><div class="word-main"><div class="word">${item.word}</div><div class="ipa">${item.ipa} / ${item.categoryName}</div></div><span class="chip">${item.islandName}</span></div>`}
function openFromWorkout(islandId,categoryId,key){const zone=DATA.find(i=>i.id===islandId),category=zone.categories.find(c=>c.id===categoryId);currentIslandId=islandId;currentCategoryId=categoryId;currentWords=category.words.map(item=>({...item,islandId,islandName:zone.name,categoryId,categoryName:category.name}));currentIndex=currentWords.findIndex(x=>favKey(x)===key);if(currentIndex<0)currentIndex=0;isStudy=false;renderCard();showScreen(currentWords[currentIndex].type==="pair"?"earPracticeScreen":"practiceScreen")}
function esc(s){return String(s).replace(/'/g,"\'")}
if(window.speechSynthesis&&window.speechSynthesis.addEventListener){window.speechSynthesis.addEventListener("voiceschanged",()=>{});}
function layoutHotspots(){const img=document.getElementById("posterImg");const layer=document.getElementById("hotspotLayer");if(!img||!layer||!img.naturalWidth)return;const r=img.getBoundingClientRect();const stage=document.getElementById("posterStage").getBoundingClientRect();layer.style.left=(r.left-stage.left)+"px";layer.style.top=(r.top-stage.top)+"px";layer.style.width=r.width+"px";layer.style.height=r.height+"px";document.querySelectorAll("[data-hot]").forEach(btn=>{const x=+btn.dataset.x,y=+btn.dataset.y,w=+btn.dataset.w,h=+btn.dataset.h;btn.style.left=(x/img.naturalWidth*r.width)+"px";btn.style.top=(y/img.naturalHeight*r.height)+"px";btn.style.width=(w/img.naturalWidth*r.width)+"px";btn.style.height=(h/img.naturalHeight*r.height)+"px";});}
function toggleDebug(){document.body.classList.toggle("debug-hotspots");layoutHotspots();}
function updateDiag(screen){const d=document.getElementById("diagText");if(!d)return;d.textContent=`screen:${screen} / zone:${currentIslandId||"-"} / category:${currentCategoryId||"-"} / items:${currentWords.length||0} / index:${currentWords.length?currentIndex+1:0}`;}
window.addEventListener("resize",layoutHotspots);
window.addEventListener("orientationchange",()=>setTimeout(layoutHotspots,220));
window.addEventListener("DOMContentLoaded",()=>{const img=document.getElementById("posterImg");if(img){if(img.complete)layoutHotspots();img.addEventListener("load",layoutHotspots);}updateDiag("home");});

</script></body></html>
