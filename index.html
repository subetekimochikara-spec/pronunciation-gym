er:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.18);color:var(--text);font-size:16px}.hint{color:var(--muted);font-size:13px;line-height:1.5;margin:8px 0 0}.modal{position:fixed;inset:0;background:rgba(0,0,0,.58);display:none;align-items:flex-end;justify-content:center;z-index:10}.modal.open{display:flex}.sheet{width:min(560px,100%);background:#0b1729;border:1px solid rgba(255,255,255,.16);border-radius:28px 28px 0 0;padding:22px 18px 30px;box-shadow:0 -20px 80px rgba(0,0,0,.45)}.symbol{font-size:42px;font-weight:950;color:var(--accent);margin:0 0 4px}.sheet h3{margin:0 0 10px;font-size:22px}.row{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.11);border-radius:18px;padding:13px;margin:10px 0;text-align:left}.row b{display:block;color:#dffaff;margin-bottom:5px}.chips{display:flex;flex-wrap:wrap;gap:9px;margin-top:8px}.chip{border:1px solid rgba(94,231,255,.34);background:rgba(94,231,255,.13);color:#e9fbff;border-radius:999px;padding:10px 13px;font-weight:900}.close{width:100%;margin-top:14px;border:0;border-radius:18px;padding:14px;background:rgba(255,255,255,.13);color:var(--text);font-weight:900}.smallnote{font-size:12px;color:var(--muted);line-height:1.6;margin-top:10px}.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:rgba(10,22,38,.94);border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:12px 16px;font-weight:900;display:none;z-index:20}.toast.show{display:block}


/* ===== Ver.3 Top Screen: America x Future x Pronunciation ===== */
#home{
  overflow:hidden;
  background:
    radial-gradient(circle at 50% 34%, rgba(94,231,255,.28) 0, rgba(94,231,255,.08) 23%, transparent 48%),
    linear-gradient(135deg, rgba(191,10,48,.18), transparent 28%),
    linear-gradient(225deg, rgba(0,40,104,.42), transparent 42%);
}
#home:before{
  content:"";
  position:fixed;
  inset:-20%;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.065) 0 6px, transparent 6px 34px),
    repeating-linear-gradient(90deg, rgba(255,255,255,.035) 0 3px, transparent 3px 58px);
  transform:perspective(700px) rotateX(62deg) translateY(12%);
  transform-origin:center bottom;
  opacity:.38;
  pointer-events:none;
}
#home:after{
  content:"";
  position:fixed;
  inset:0;
  background:
    linear-gradient(90deg, rgba(191,10,48,.28) 0 7%, transparent 7% 14%, rgba(255,255,255,.08) 14% 21%, transparent 21% 28%, rgba(0,40,104,.28) 28% 35%, transparent 35%),
    radial-gradient(circle at 12% 18%, rgba(255,255,255,.65) 0 2px, transparent 3px),
    radial-gradient(circle at 18% 24%, rgba(255,255,255,.65) 0 1.5px, transparent 2.5px),
    radial-gradient(circle at 22% 15%, rgba(255,255,255,.65) 0 1.5px, transparent 2.5px);
  opacity:.34;
  pointer-events:none;
  mix-blend-mode:screen;
}
.hero.v3{
  width:min(620px,94vw);
  position:relative;
}
.v3 .badge{
  background:linear-gradient(135deg, rgba(191,10,48,.32), rgba(0,40,104,.32));
  border-color:rgba(255,255,255,.28);
  box-shadow:0 0 24px rgba(94,231,255,.18);
  text-transform:uppercase;
  letter-spacing:.12em;
}
.v3 .title{
  font-size:clamp(44px, 12vw, 72px);
  letter-spacing:-.065em;
  text-shadow:0 0 22px rgba(94,231,255,.35), 0 10px 30px rgba(0,0,0,.42);
  margin-bottom:8px;
}
.v3 .subtitle{
  color:#e6f4ff;
  margin-bottom:20px;
}
.arena{
  position:relative;
  width:min(470px,92vw);
  height:330px;
  margin:2px auto 26px;
  display:flex;
  align-items:center;
  justify-content:center;
}
.mic-core{
  position:relative;
  width:150px;
  height:210px;
  border-radius:72px 72px 42px 42px;
  background:
    linear-gradient(90deg, rgba(255,255,255,.18) 0 12%, transparent 12% 88%, rgba(255,255,255,.16) 88%),
    linear-gradient(180deg,#ffffff 0,#9ff5ff 17%,#25bcff 45%,#154fe5 100%);
  box-shadow:0 0 36px rgba(94,231,255,.8),0 0 100px rgba(37,188,255,.42), inset 0 -16px 28px rgba(0,0,0,.28);
  z-index:3;
  animation:micFloat 3.7s ease-in-out infinite;
}
.mic-core:before{
  content:"";
  position:absolute;
  left:28px; right:28px; top:26px; bottom:32px;
  background:repeating-linear-gradient(180deg, rgba(7,16,39,.55) 0 4px, transparent 4px 15px);
  border-radius:40px;
  opacity:.75;
}
.mic-core:after{
  content:"🇺🇸";
  position:absolute;
  left:50%; top:50%;
  transform:translate(-50%,-35%);
  font-size:40px;
  filter:drop-shadow(0 8px 12px rgba(0,0,0,.35));
}
.mic-stand{
  position:absolute;
  width:104px;height:74px;
  border:10px solid rgba(234,248,255,.82);
  border-top:0;
  border-radius:0 0 52px 52px;
  top:172px; z-index:2;
  box-shadow:0 0 22px rgba(94,231,255,.35);
}
.mic-stand:after{
  content:"";
  position:absolute;
  width:16px;height:70px;
  left:50%;top:52px;
  transform:translateX(-50%);
  background:linear-gradient(180deg,#eaf8ff,#5ee7ff,#244cff);
  border-radius:999px;
}
.base-line{
  position:absolute;
  width:210px;height:16px;
  top:300px;
  border-radius:999px;
  background:linear-gradient(90deg,transparent,#eaf8ff,#5ee7ff,#bf0a30,transparent);
  box-shadow:0 0 26px rgba(94,231,255,.55);
}
.sound-ring{
  position:absolute;
  border:2px solid rgba(94,231,255,.34);
  border-left-color:rgba(191,10,48,.46);
  border-right-color:rgba(255,255,255,.46);
  border-radius:50%;
  animation:spinRing 9s linear infinite;
}
.ring-a{width:250px;height:250px}.ring-b{width:320px;height:320px;animation-direction:reverse;opacity:.72}.ring-c{width:390px;height:390px;opacity:.42;animation-duration:13s}
.equalizer{
  position:absolute;
  inset:auto 34px 28px 34px;
  height:70px;
  display:flex;
  align-items:flex-end;
  justify-content:space-between;
  z-index:1;
  opacity:.72;
}
.bar{
  width:7px;
  border-radius:999px;
  background:linear-gradient(180deg,#fff,#5ee7ff,#bf0a30);
  box-shadow:0 0 14px rgba(94,231,255,.42);
  animation:bars 1.15s ease-in-out infinite;
}
.bar:nth-child(2n){animation-delay:.16s}.bar:nth-child(3n){animation-delay:.33s}.bar:nth-child(4n){animation-delay:.48s}
.neon-word{
  position:absolute;
  z-index:4;
  padding:8px 13px;
  border-radius:999px;
  background:rgba(3,10,28,.55);
  border:1px solid rgba(94,231,255,.35);
  color:#f8fdff;
  font-weight:950;
  letter-spacing:-.02em;
  box-shadow:0 0 18px rgba(94,231,255,.22), inset 0 0 18px rgba(94,231,255,.08);
  backdrop-filter:blur(10px);
  animation:wordDrift 4.2s ease-in-out infinite;
}
.nw1{top:20px;left:16px}.nw2{top:38px;right:22px;animation-delay:.4s}.nw3{left:0;bottom:80px;animation-delay:.8s}.nw4{right:0;bottom:92px;animation-delay:1.2s}.nw5{top:4px;left:50%;transform:translateX(-50%);animation-delay:1.6s}.nw6{bottom:24px;left:50%;transform:translateX(-50%);animation-delay:2s}
.scanline{
  position:absolute;
  left:50%;top:50%;
  width:2px;height:270px;
  background:linear-gradient(180deg, transparent,#fff,#5ee7ff,transparent);
  transform-origin:center;
  opacity:.5;
  animation:scanSpin 6s linear infinite;
  z-index:0;
}
.v3 .primary{
  background:linear-gradient(135deg,#ffffff 0,#5ee7ff 32%,#2858ff 66%,#bf0a30 100%);
  color:#051125;
  box-shadow:0 20px 54px rgba(94,231,255,.38),0 0 0 1px rgba(255,255,255,.22) inset;
}
@keyframes micFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes spinRing{to{transform:rotate(360deg)}}
@keyframes scanSpin{to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes bars{0%,100%{height:14px}50%{height:64px}}
@keyframes wordDrift{0%,100%{margin-top:0}50%{margin-top:-12px}}

</style>
</head>

        <button class="control" onclick="shuffleWords()">🔀 Shuffle</button>
        <button class="control wide" onclick="nextWord()">Next →</button>
      </div>
    </div>
  </div>
</section>

<div id="modal" class="modal" onclick="closeModal(event)">
  <div class="sheet" onclick="event.stopPropagation()">

    <button class="close" onclick="hideModal()">閉じる</button>
  </div>
</div>
<div id="toast" class="toast"></div>

let words = loadWords();
let index = 0;
let slow = false;
let voices = [];

function loadWords(){
  try{ const saved = JSON.parse(localStorage.getItem('pg_words')||'[]'); return [...DEFAULT_WORDS, ...saved]; }catch(e){ return DEFAULT_WORDS; }
}
function saveCustom(){
  const custom = words.slice(DEFAULT_WORDS.length);
  localStorage.setItem('pg_words', JSON.stringify(custom));
}
function startApp(){document.getElementById('home').classList.remove('active');document.getElementById('trainer').classList.add('active');render();setTimeout(speakCurrent,250)}
function goHome(){document.getElementById('trainer').classList.remove('active');document.getElementById('home').classList.add('active')}
function render(){
  const item = words[index];
  document.getElementById('counter').textContent = `${index+1} / ${words.length}`;
  document.getElementById('word').textContent = item.word;
  document.getElementById('meaning').textContent = item.meaning || '';
  const ipa = document.getElementById('ipa'); ipa.innerHTML = '';
  ipa.appendChild(document.createTextNode('/'));
  (item.tokens || tokenizeIPA(item.ipa)).forEach(t=>{ const s=document.createElement('span'); s.textContent=t; s.onclick=()=>showPhoneme(t); ipa.appendChild(s); });
  ipa.appendChild(document.createTextNode('/'));
  document.getElementById('slowBtn').classList.toggle('on', slow);
}
function tokenizeIPA(ipa){
  return ipa.replaceAll('/','').replaceAll('.','').split('').filter(Boolean);
}
function getVoice(){
  voices = speechSynthesis.getVoices();
  return voices.find(v=>/en-US/i.test(v.lang) && /Samantha|Ava|Allison|Susan|Google US English|Microsoft/i.test(v.name)) || voices.find(v=>/en-US/i.test(v.lang)) || voices[0];
}
function speakCurrent(){
  const item = words[index];
  if(!('speechSynthesis' in window)){toast('このブラウザは音声読み上げに未対応やで');return;}
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(item.word);
  u.lang = 'en-US';
  u.rate = slow ? 0.5 : 1.0; // Rule 8: Slow = Normalの50%
  u.pitch = 1.0;
  const v = getVoice(); if(v) u.voice = v;
  speechSynthesis.speak(u);
}
if('speechSynthesis' in window){ speechSynthesis.onvoiceschanged = ()=>voices = speechSynthesis.getVoices(); }
function nextWord(){ index = (index + 1) % words.length; render(); setTimeout(speakCurrent,120); }
function toggleSlow(){ slow = !slow; render(); speakCurrent(); }
function shuffleWords(){ for(let i=words.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [words[i],words[j]]=[words[j],words[i]]; } index=0; render(); speakCurrent(); }
// Rule 31-34: This HTML is learning-only. New complete word cards are added by editing the dictionary via ChatGPT on MacBook.
function tokenizeSmart(ipa){
  let s=ipa.replaceAll('/','').replaceAll('.','');
  const known=Object.keys(PHONEMES).sort((a,b)=>b.length-a.length);
  const out=[]; let i=0;
  while(i<s.length){
    if(s[i]===' '){i++;continue}
    let hit='';
    for(const k of known){ if(s.startsWith(k,i)){ hit=k; break; } }
    if(hit){ out.push(hit); i+=hit.length; } else { out.push(s[i]); i++; }
  }
  return out;
}
function showPhoneme(t){
  const p = PHONEMES[t] || {title:`/${t}/`, sound:'この音の説明はまだ未登録。今後追加できるで。', mouth:'発音記号データを追加するとここに表示される。', words:[]};
  document.getElementById('modalSymbol').textContent = t;
  document.getElementById('modalTitle').textContent = p.title;
  document.getElementById('modalSound').textContent = p.sound;
  document.getElementById('modalMouth').textContent = p.mouth;
  const box=document.getElementById('modalWords'); box.innerHTML='';
  p.words.forEach(w=>{ const b=document.createElement('button'); b.className='chip'; b.textContent=w; b.onclick=()=>jumpToWord(w); box.appendChild(b); });
  if(!p.words.length){ box.textContent='仲間単語は未登録'; }
  document.getElementById('modal').classList.add('open');
}
function jumpToWord(w){
  let found = words.findIndex(x=>x.word.toLowerCase()===w.toLowerCase());
  if(found === -1){
    const base = DEFAULT_WORDS.find(x=>x.word.toLowerCase()===w.toLowerCase());
    if(base){ words.push(base); found = words.length-1; }
  }
  if(found === -1){ toast('この単語カードはまだ未登録やで'); return; }
  index = found; hideModal(); render(); setTimeout(speakCurrent,180);
}
function hideModal(){document.getElementById('modal').classList.remove('open')}
function closeModal(e){ if(e.target.id==='modal') hideModal(); }
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1800); }
